<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Labs | TerabyteEXE</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e1e2e'/><text x='50%' y='50%' font-size='60' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>⬡</text></svg>">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="brand">
      <a href="https://github.com/TerabyteEXE/NodeLabs" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">Node Labs</a>
      <input type="text" id="project-name" class="project-name-input" value="Untitled Project" title="Project Name">
    </div>
    
    <div class="toolbar-section">
      <div class="search-wrapper">
        <input type="text" id="node-search" placeholder="🔍 Add device..." autocomplete="off">
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>
      
      <div class="btn-group">
        <button onclick="addBackdrop()">+ Backdrop</button>
        <button id="btn-grid" class="active" onclick="toggleGrid()">Grid Snap</button>
        <button onclick="snapAllNodes()">Align All</button>
      </div>
    </div>

    <div class="toolbar-section" style="margin-left: auto;">
      <div class="btn-group">
        <button onclick="exportJSON()">Save</button>
        <button onclick="importJSON()">Open</button>
        <button onclick="resetView()">Center</button>
        <button onclick="openSettings()">Settings</button>
      </div>
    </div>
  </header>

  <div class="app-container">
    <div id="viewport">
      <div id="canvas">
        <svg id="svg-layer">
          <path id="drag-line" class="drag-line" d="" style="display:none;"></path>
        </svg>
      </div>
    </div>

    <aside id="sidebar-panel" class="hidden">
      <div class="sidebar-section">
        <h3>Layers</h3>
        <div id="layers-list" class="layers-list"></div>
        <button onclick="addLayer()" style="width: 100%; margin-top: 8px;">+ Add Layer</button>
      </div>

      <div class="sidebar-section" style="flex: 1; overflow-y: auto;">
        <h3>Inspector</h3>
        <div id="inspector-content">
          <p style="color: var(--text-muted); font-size: 0.85rem;">Select a node, connection, or backdrop to inspect properties.</p>
        </div>
      </div>
    </aside>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" onclick="closeSettings()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>Theme</h3>
          <div class="theme-grid">
            <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
            <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
            <button class="theme-btn" data-theme="grey" onclick="setTheme('grey')">Grey</button>
            <button class="theme-btn" data-theme="vaporwave" onclick="setTheme('vaporwave')">Vaporwave</button>
            <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
            <button class="theme-btn" data-theme="sunset" onclick="setTheme('sunset')">Sunset</button>
          </div>
        </div>
        <div class="settings-section">
          <h3>Canvas & Interface</h3>
          <div class="setting-item">
            <label>Grid Snap</label>
            <input type="checkbox" id="setting-grid" onchange="updateGridSetting()">
          </div>
          <div class="setting-item">
            <label>Always Keep Sidebar Open</label>
            <input type="checkbox" id="setting-sidebar" onchange="updateSidebarSetting()">
          </div>
        </div>
        <div class="settings-section">
          <button onclick="clearCanvas()" style="width: 100%; margin-top: 16px; border-color: var(--accent-pink); color: var(--accent-pink);">Clear Canvas</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)" style="display: none;">

  <script src="js/componentLibrary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
