<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Labs - A/V Schematic Builder</title>
  <style>
    :root {
      --bg-dark: #0f111a;
      --bg-panel: rgba(22, 25, 38, 0.75);
      --bg-card: #181b2a;
      --bg-card-hover: #22263a;
      --accent-cyan: #00f5d4;
      --accent-purple: #7b2cbf;
      --accent-pink: #ff006e;
      --accent-blue: #3a86ff;
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-highlight: rgba(0, 245, 212, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Header --- */
    header {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0, 245, 212, 0.3);
    }

    .brand h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .brand span {
      font-size: 0.7rem;
      color: var(--accent-cyan);
      background: rgba(0, 245, 212, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(0, 245, 212, 0.2);
    }

    .actions {
      display: flex;
      gap: 0.6rem;
    }

    button {
      background: var(--bg-card);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    button:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-cyan);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent-purple), #9d4edd);
      border: none;
      box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
    }

    button.primary:hover {
      box-shadow: 0 6px 16px rgba(123, 44, 191, 0.5);
      transform: translateY(-1px);
    }

    /* --- Workspace Layout --- */
    .app-container {
      display: flex;
      flex: 1;
      position: relative;
    }

    /* --- Left Sidebar --- */
    sidebar {
      width: 260px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-color);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 5;
    }

    sidebar h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }

    .node-palette {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
    }

    .palette-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s ease;
    }

    .palette-item:hover {
      border-color: var(--accent-cyan);
      background: var(--bg-card-hover);
      transform: translateX(4px);
    }

    .palette-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Workspace Canvas --- */
    #workspace {
      flex: 1;
      position: relative;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      overflow: hidden;
    }

    #svg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* --- Cables & Animations --- */
    path.connector {
      stroke: var(--accent-cyan);
      stroke-width: 3px;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
      stroke-dasharray: 8, 6;
      animation: signalFlow 1s linear infinite;
      transition: stroke 0.2s, stroke-width 0.2s;
    }

    path.connector:hover, path.connector.selected {
      stroke: var(--accent-pink);
      stroke-width: 5px;
      filter: drop-shadow(0 0 6px var(--accent-pink));
    }

    path.drag-line {
      stroke: var(--accent-blue);
      stroke-width: 3px;
      fill: none;
      stroke-dasharray: 4, 4;
    }

    @keyframes signalFlow {
      from { stroke-dashoffset: 28; }
      to { stroke-dashoffset: 0; }
    }

    /* --- Animated Node Cards --- */
    .node {
      position: absolute;
      width: 220px;
      background: rgba(24, 27, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      cursor: grab;
      display: flex;
      flex-direction: column;
      z-index: 2;
      animation: nodeSpawn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .node:active {
      cursor: grabbing;
    }

    .node.selected {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.25), 0 10px 25px rgba(0,0,0,0.5);
    }

    @keyframes nodeSpawn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .node-header {
      padding: 0.75rem 0.9rem;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 12px 12px 0 0;
    }

    .node-body {
      padding: 0.8rem 0.9rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .node-body div {
      display: flex;
      justify-content: space-between;
    }

    .node-body span {
      color: var(--text-main);
      font-weight: 500;
    }

    .node-ports {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0.9rem;
      background: rgba(0,0,0,0.25);
      border-radius: 0 0 12px 12px;
    }

    .port {
      width: 14px;
      height: 14px;
      background: var(--bg-dark);
      border: 2px solid var(--accent-cyan);
      border-radius: 50%;
      cursor: crosshair;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .port:hover {
      transform: scale(1.4);
      background: var(--accent-cyan);
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    .port.input { margin-left: -16px; border-color: var(--accent-blue); }
    .port.input:hover { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
    .port.output { margin-right: -16px; }

    /* --- Right Inspector --- */
    inspector {
      width: 280px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-left: 1px solid var(--border-color);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      z-index: 5;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-group label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .field-group input, .field-group textarea {
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus, .field-group textarea:focus {
      border-color: var(--accent-cyan);
    }

    .field-group textarea {
      resize: vertical;
      min-height: 90px;
      user-select: text;
    }

    .empty-state {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 3rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-logo"></div>
      <h1>Node Labs</h1>
      <span>PRO 2026</span>
    </div>
    <div class="actions">
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="importJSON()">Import JSON</button>
      <button class="primary" onclick="exportSVG()">Export Schematic</button>
    </div>
  </header>

  <div class="app-container">
    <sidebar>
      <h2>AV Component Library</h2>
      <div class="node-palette">
        <div class="palette-item" onclick="createNode('Network Switch', '#00f5d4', 'switch')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#00f5d4" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
          Network Switch
        </div>
        <div class="palette-item" onclick="createNode('Audio Mixer', '#7b2cbf', 'mixer')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#7b2cbf" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m-6-12v8m12-4v4"/></svg></div>
          Audio Mixer
        </div>
        <div class="palette-item" onclick="createNode('Computer', '#ff006e', 'pc')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#ff006e" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg></div>
          Computer
        </div>
        <div class="palette-item" onclick="createNode('Monitor', '#fee440', 'display')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#fee440" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M12 17v4"/></svg></div>
          Monitor
        </div>
        <div class="palette-item" onclick="createNode('Cable Junction', '#3a86ff', 'cable')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#3a86ff" stroke-width="2" viewBox="0 0 24 24"><path d="M4 12h16"/></svg></div>
          Cable Junction
        </div>
        <div class="palette-item" onclick="createNode('Screen / Projector', '#8338ec', 'screen')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#8338ec" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="12" rx="1"/><path d="M10 17l-2 4m8-4l2 4"/></svg></div>
          Screen
        </div>
        <div class="palette-item" onclick="createNode('Speaker', '#fb5607', 'speaker')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#fb5607" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07"/></svg></div>
          Speaker
        </div>
        <div class="palette-item" onclick="createNode('Microphone', '#ffbe0b', 'mic')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#ffbe0b" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2m7 9v4"/></svg></div>
          Microphone
        </div>
        <div class="palette-item" onclick="createNode('Custom Device', '#00bbf9', 'custom')">
          <div class="palette-icon"><svg width="16" height="16" fill="none" stroke="#00bbf9" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg></div>
          Custom Node
        </div>
      </div>
    </sidebar>

    <div id="workspace">
      <svg id="svg-layer">
        <path id="drag-line" class="drag-line" d="" style="display:none;"></path>
      </svg>
    </div>

    <inspector id="inspector">
      <h2>Inspector</h2>
      <div id="inspector-content" class="empty-state">
        Select any node or cable connection to inspect diagnostic parameters and troubleshooting notes.
      </div>
    </inspector>
  </div>

  <input type="file" id="file-input" style="display:none" accept=".json" onchange="handleFileSelect(event)">

  <script>
    let nodes = [];
    let connections = [];
    let selectedNodeId = null;
    let selectedConnectionId = null;
    let draggingNodeId = null;
    let dragOffset = { x: 0, y: 0 };
    let connectingPort = null;

    const workspace = document.getElementById('workspace');
    const svgLayer = document.getElementById('svg-layer');
    const dragLine = document.getElementById('drag-line');

    // Keydown for delete
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (selectedNodeId) deleteNode(selectedNodeId);
        else if (selectedConnectionId) deleteConnection(selectedConnectionId);
      }
    });

    // Spawn Nodes
    function createNode(type, color, iconType, x = 120 + Math.random() * 150, y = 120 + Math.random() * 150) {
      const id = 'node_' + Date.now();
      const newNode = {
        id,
        type,
        label: type,
        color,
        x,
        y,
        model: 'Generic Model',
        ip: '192.168.1.' + Math.floor(Math.random() * 200 + 10),
        details: 'Troubleshooting details: Add Dante routing, audio format, resolutions, or baud rates here.'
      };
      nodes.push(newNode);
      renderNode(newNode);
      selectNode(id);
    }

    function renderNode(node) {
      const el = document.createElement('div');
      el.className = 'node';
      el.id = node.id;
      el.style.left = node.x + 'px';
      el.style.top = node.y + 'px';

      el.innerHTML = `
        <div class="node-header" style="border-top: 3px solid ${node.color}">
          <span>${node.label}</span>
        </div>
        <div class="node-body">
          <div>IP/ID <span class="ip-tag">${node.ip}</span></div>
          <div>Model <span class="model-tag">${node.model}</span></div>
        </div>
        <div class="node-ports">
          <div class="port input" data-node="${node.id}" data-port="input" title="Signal Input"></div>
          <div class="port output" data-node="${node.id}" data-port="output" title="Signal Output"></div>
        </div>
      `;

      // Dragging Nodes
      el.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('port')) return;
        draggingNodeId = node.id;
        dragOffset.x = e.clientX - node.x;
        dragOffset.y = e.clientY - node.y;
        selectNode(node.id);
        e.stopPropagation();
      });

      // Interactive Cable Dragging
      const ports = el.querySelectorAll('.port');
      ports.forEach(port => {
        port.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          const rect = port.getBoundingClientRect();
          const wRect = workspace.getBoundingClientRect();
          connectingPort = {
            nodeId: node.id,
            type: port.dataset.port,
            x: rect.left + rect.width / 2 - wRect.left,
            y: rect.top + rect.height / 2 - wRect.top
          };
          dragLine.style.display = 'block';
        });
      });

      workspace.appendChild(el);
    }

    // Global Mouse Events
    window.addEventListener('mousemove', (e) => {
      const wRect = workspace.getBoundingClientRect();

      // Node Dragging
      if (draggingNodeId) {
        const node = nodes.find(n => n.id === draggingNodeId);
        if (node) {
          node.x = e.clientX - dragOffset.x;
          node.y = e.clientY - dragOffset.y;
          const el = document.getElementById(node.id);
          el.style.left = node.x + 'px';
          el.style.top = node.y + 'px';
          updateConnections();
        }
      }

      // Cable Dragging Line
      if (connectingPort) {
        const mouseX = e.clientX - wRect.left;
        const mouseY = e.clientY - wRect.top;
        const dx = Math.abs(mouseX - connectingPort.x) * 0.5;
        
        let pathD = connectingPort.type === 'output' 
          ? `M ${connectingPort.x} ${connectingPort.y} C ${connectingPort.x + dx} ${connectingPort.y}, ${mouseX - dx} ${mouseY}, ${mouseX} ${mouseY}`
          : `M ${mouseX} ${mouseY} C ${mouseX + dx} ${mouseY}, ${connectingPort.x - dx} ${connectingPort.y}, ${connectingPort.x} ${connectingPort.y}`;
        
        dragLine.setAttribute('d', pathD);
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (connectingPort) {
        const targetPort = e.target.closest('.port');
        if (targetPort) {
          const targetNodeId = targetPort.dataset.node;
          const targetPortType = targetPort.dataset.port;

          if (connectingPort.nodeId !== targetNodeId && connectingPort.type !== targetPortType) {
            const fromId = connectingPort.type === 'output' ? connectingPort.nodeId : targetNodeId;
            const toId = connectingPort.type === 'output' ? targetNodeId : connectingPort.nodeId;
            createConnection(fromId, toId);
          }
        }
        connectingPort = null;
        dragLine.style.display = 'none';
      }
      draggingNodeId = null;
    });

    // Create Cables
    function createConnection(fromId, toId) {
      if (connections.some(c => c.from === fromId && c.to === toId)) return;
      connections.push({ id: 'conn_' + Date.now(), from: fromId, to: toId, label: 'Standard Cable' });
      updateConnections();
    }

    // Render Curves
    function updateConnections() {
      // Clear existing connectors except the drag-line
      const existing = svgLayer.querySelectorAll('.connector');
      existing.forEach(el => el.remove());

      connections.forEach(conn => {
        const fromEl = document.querySelector(`#${conn.from} .port.output`);
        const toEl = document.querySelector(`#${conn.to} .port.input`);

        if (fromEl && toEl) {
          const rectA = fromEl.getBoundingClientRect();
          const rectB = toEl.getBoundingClientRect();
          const wRect = workspace.getBoundingClientRect();

          const x1 = rectA.left + rectA.width / 2 - wRect.left;
          const y1 = rectA.top + rectA.height / 2 - wRect.top;
          const x2 = rectB.left + rectB.width / 2 - wRect.left;
          const y2 = rectB.top + rectB.height / 2 - wRect.top;

          const dx = Math.abs(x2 - x1) * 0.5;
          const pathD = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', pathD);
          path.setAttribute('class', `connector ${selectedConnectionId === conn.id ? 'selected' : ''}`);
          path.onclick = (e) => {
            e.stopPropagation();
            selectConnection(conn.id);
          };

          svgLayer.appendChild(path);
        }
      });
    }

    // Node Selection & Inspector
    function selectNode(id) {
      selectedNodeId = id;
      selectedConnectionId = null;
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
      document.getElementById(id)?.classList.add('selected');
      updateConnections();

      const node = nodes.find(n => n.id === id);
      const inspector = document.getElementById('inspector-content');

      if (!node) return;

      inspector.innerHTML = `
        <div class="field-group">
          <label>Device Name</label>
          <input type="text" value="${node.label}" oninput="updateNodeProperty('${id}', 'label', this.value)">
        </div>
        <div class="field-group">
          <label>Model Specs</label>
          <input type="text" value="${node.model}" oninput="updateNodeProperty('${id}', 'model', this.value)">
        </div>
        <div class="field-group">
          <label>IP / Network Identifier</label>
          <input type="text" value="${node.ip}" oninput="updateNodeProperty('${id}', 'ip', this.value)">
        </div>
        <div class="field-group">
          <label>Diagnostics & Notes</label>
          <textarea oninput="updateNodeProperty('${id}', 'details', this.value)">${node.details}</textarea>
        </div>
        <button onclick="deleteNode('${id}')" style="margin-top:1rem; border-color:var(--accent-pink); color:var(--accent-pink);">Delete Node (Del)</button>
      `;
    }

    function selectConnection(id) {
      selectedConnectionId = id;
      selectedNodeId = null;
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
      updateConnections();

      const conn = connections.find(c => c.id === id);
      const inspector = document.getElementById('inspector-content');

      inspector.innerHTML = `
        <div class="field-group">
          <label>Cable Tag / Type</label>
          <input type="text" value="${conn.label}" oninput="conn.label = this.value">
        </div>
        <button onclick="deleteConnection('${id}')" style="margin-top:1rem; border-color:var(--accent-pink); color:var(--accent-pink);">Remove Cable (Del)</button>
      `;
    }

    function updateNodeProperty(id, prop, value) {
      const node = nodes.find(n => n.id === id);
      if (node) {
        node[prop] = value;
        const el = document.getElementById(id);
        if (prop === 'label') el.querySelector('.node-header span').innerText = value;
        if (prop === 'ip') el.querySelector('.ip-tag').innerText = value;
        if (prop === 'model') el.querySelector('.model-tag').innerText = value;
      }
    }

    function deleteNode(id) {
      nodes = nodes.filter(n => n.id !== id);
      connections = connections.filter(c => c.from !== id && c.to !== id);
      document.getElementById(id)?.remove();
      updateConnections();
      document.getElementById('inspector-content').innerHTML = '<div class="empty-state">Select a node or connection to inspect.</div>';
    }

    function deleteConnection(id) {
      connections = connections.filter(c => c.id !== id);
      selectedConnectionId = null;
      updateConnections();
      document.getElementById('inspector-content').innerHTML = '<div class="empty-state">Select a node or connection to inspect.</div>';
    }

    function clearCanvas() {
      if (confirm('Clear the current schematic canvas?')) {
        nodes = [];
        connections = [];
        document.querySelectorAll('.node').forEach(n => n.remove());
        updateConnections();
        document.getElementById('inspector-content').innerHTML = '<div class="empty-state">Select a node or connection to inspect.</div>';
      }
    }

    // Import / Export
    function exportJSON() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ nodes, connections }, null, 2));
      const anchor = document.createElement('a');
      anchor.setAttribute("href", dataStr);
      anchor.setAttribute("download", "node-labs-schematic.json");
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function importJSON() {
      document.getElementById('file-input').click();
    }

    function handleFileSelect(evt) {
      const file = evt.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          clearCanvas();
          nodes = data.nodes || [];
          connections = data.connections || [];
          nodes.forEach(node => renderNode(node));
          updateConnections();
        } catch (err) {
          alert('Invalid JSON schematic format.');
        }
      };
      reader.readAsText(file);
    }

    function exportSVG() {
      const svgCloned = svgLayer.cloneNode(true);
      svgCloned.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      const svgData = new XMLSerializer().serializeToString(svgCloned);
      const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "node-labs-diagram.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Seed Demo Setup
    createNode('Network Switch', '#00f5d4', 'switch', 80, 120);
    createNode('Audio Mixer', '#7b2cbf', 'mixer', 380, 120);
    createNode('Speaker', '#fb5607', 'speaker', 680, 120);
    setTimeout(() => {
      createConnection(nodes[0].id, nodes[1].id);
      createConnection(nodes[1].id, nodes[2].id);
    }, 50);
  </script>
</body>
</html>
