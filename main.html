<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Labs - Pro A/V Builder</title>
  <style>
    /* --- CSS Variables for Light & Dark Modes --- */
    :root[data-theme="dark"] {
      --bg-base: #0b0d14;
      --bg-panel: #141722;
      --bg-node: #1c2030;
      --bg-node-header: #24293d;
      --border-subtle: #2a2f45;
      --border-active: #4a5578;
      
      --accent-cyan: #00e5ff;
      --accent-purple: #9d4edd;
      --accent-blue: #3a86ff;
      --accent-pink: #ff006e;
      
      --text-main: #e2e8f0;
      --text-muted: #8b9bb4;
      --grid-dot: #2a2f45;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    :root[data-theme="light"] {
      --bg-base: #f4f6fb;
      --bg-panel: #ffffff;
      --bg-node: #ffffff;
      --bg-node-header: #f1f5f9;
      --border-subtle: #cbd5e1;
      --border-active: #3a86ff;
      
      --accent-cyan: #0284c7;
      --accent-purple: #7e22ce;
      --accent-blue: #2563eb;
      --accent-pink: #e11d48;
      
      --text-main: #0f172a;
      --text-muted: #64748b;
      --grid-dot: #cbd5e1;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none; 
      transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Top Navigation / Toolbar --- */
    header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0.5rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      height: 56px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .brand { 
      font-size: 0.95rem; 
      font-weight: 700; 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      letter-spacing: -0.2px;
    }
    .brand span { 
      font-size: 0.65rem; 
      color: var(--text-muted); 
      background: var(--bg-base); 
      border: 1px solid var(--border-subtle);
      padding: 2px 6px; 
      border-radius: 4px; 
    }

    .toolbar-center {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-wrapper { position: relative; }
    .search-wrapper input {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      color: var(--text-main);
      padding: 7px 14px;
      border-radius: 6px;
      width: 260px;
      outline: none;
      font-size: 0.85rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .search-wrapper input:focus { 
      border-color: var(--accent-blue); 
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.15);
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px); 
      left: 0; right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      z-index: 200;
      box-shadow: 0 8px 24px var(--shadow);
      animation: dropDown 0.2s ease-out;
    }
    @keyframes dropDown {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .search-dropdown.active { display: block; }
    .search-item {
      padding: 9px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--bg-base);
      transition: background-color 0.15s ease;
    }
    .search-item:hover { background: var(--bg-node-header); }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; }

    .btn-group { display: flex; gap: 6px; align-items: center; }
    
    button {
      background: var(--bg-node);
      color: var(--text-main);
      border: 1px solid var(--border-subtle);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
    }
    button:hover { 
      background: var(--bg-node-header); 
      border-color: var(--border-active);
      transform: translateY(-1px);
    }
    button:active { transform: translateY(0); }
    button.active { 
      background: var(--accent-blue); 
      border-color: var(--accent-blue); 
      color: #ffffff; 
    }

    /* --- Main Layout --- */
    .app-container {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* --- Viewport & Canvas (Pan/Zoom) --- */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      background-color: var(--bg-base);
      background-image: radial-gradient(circle, var(--grid-dot) 1.2px, transparent 1.2px);
      background-size: 28px 28px;
    }
    #viewport:active { cursor: grabbing; }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #svg-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* --- Animated Node Cards --- */
    .node {
      position: absolute;
      width: 210px;
      background: var(--bg-node);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      cursor: default;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px var(--shadow);
      animation: nodePop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition: box-shadow 0.2s, border-color 0.2s, opacity 0.2s;
    }
    
    @keyframes nodePop {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .node.selected { 
      border-color: var(--accent-blue); 
      box-shadow: 0 0 0 2px var(--accent-blue), 0 8px 24px var(--shadow);
    }
    .node.hidden { display: none; }

    .node-header {
      padding: 8px 10px;
      background: var(--bg-node-header);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 7px 7px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: grab;
    }
    .node-header:active { cursor: grabbing; }

    .node-body {
      padding: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .node-body div { margin-bottom: 4px; display: flex; justify-content: space-between; }
    .node-body span { color: var(--text-main); font-weight: 500; }

    .node-ports {
      display: flex;
      justify-content: space-between;
      position: relative;
      height: 0;
    }
    
    .port {
      width: 12px; height: 12px;
      background: var(--bg-panel);
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      cursor: crosshair;
      position: absolute;
      top: -6px;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }
    .port:hover { 
      transform: scale(1.4); 
      border-color: var(--accent-cyan); 
      background: var(--accent-cyan); 
    }
    .port.input { left: -6px; }
    .port.output { right: -6px; }

    /* --- Cables & Signal Flow --- */
    path.connector {
      stroke: var(--accent-blue);
      stroke-width: 2.5px;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
      stroke-dasharray: 6, 6;
      animation: signalFlow 1s linear infinite;
      transition: stroke 0.2s ease, stroke-width 0.2s ease;
    }
    
    @keyframes signalFlow {
      from { stroke-dashoffset: 12; }
      to { stroke-dashoffset: 0; }
    }

    path.connector:hover, path.connector.selected { 
      stroke: var(--accent-pink); 
      stroke-width: 4px; 
    }

    path.drag-line {
      stroke: var(--accent-cyan);
      stroke-width: 2px;
      fill: none;
      stroke-dasharray: 4, 4;
    }

    /* --- Right Sidebar --- */
    aside {
      width: 280px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      z-index: 10;
      box-shadow: -2px 0 10px var(--shadow);
    }

    .panel-section {
      padding: 1rem;
      border-bottom: 1px solid var(--border-subtle);
      flex: 1;
      overflow-y: auto;
    }
    .panel-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Form Fields */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      color: var(--text-main);
      padding: 7px;
      border-radius: 6px;
      font-size: 0.8rem;
      outline: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent-blue); }

    /* Layers List */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--bg-node);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .layer-item input[type="text"] {
      background: transparent;
      border: none;
      color: var(--text-main);
      flex: 1;
      outline: none;
      font-size: 0.8rem;
    }
    .layer-item button.toggle {
      background: transparent;
      border: none;
      padding: 2px 4px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .layer-item button.toggle:hover { color: var(--text-main); transform: none; }
    .layer-item.hidden-layer { opacity: 0.4; }

    #file-input { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="brand">Node Labs <span>PRO</span></div>
    
    <div class="toolbar-center">
      <div class="search-wrapper">
        <input type="text" id="node-search" placeholder="🔍 Add device (Switch, Mixer...)" autocomplete="off">
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>
      
      <div class="btn-group">
        <button id="btn-grid" class="active" onclick="toggleGrid()">Grid Snap</button>
        <button onclick="snapAllNodes()">Align All</button>
      </div>
    </div>

    <div class="btn-group">
      <button onclick="exportJSON()" title="Export Design File">💾 Export</button>
      <button onclick="importJSON()" title="Import Design File">📂 Import</button>
      <button id="btn-theme" onclick="toggleTheme()" title="Toggle Theme">☀️ Light</button>
      <button onclick="resetView()" title="Reset Canvas View">🎯 Center</button>
      <button onclick="clearCanvas()" style="color: var(--accent-pink);">Clear</button>
    </div>
  </header>

  <div class="app-container">
    <div id="viewport">
      <div id="canvas">
        <svg id="svg-layer">
          <path id="drag-line" class="drag-line" d="" style="display:none;"></path>
        </svg>
        </div>
    </div>

    <aside>
      <div class="panel-section" style="flex: 0.5;">
        <h3>Layers <button onclick="addLayer()">+ Add</button></h3>
        <div id="layers-list"></div>
      </div>
      
      <div class="panel-section" style="flex: 1;">
        <h3>Inspector</h3>
        <div id="inspector-content">
          <div style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 2rem;">Select a node or cable connection to inspect.</div>
        </div>
      </div>
    </aside>
  </div>

  <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)">

  <script>
    // --- Global Application State ---
    let nodes = [];
    let connections = [];
    let layers = [
      { id: 'layer_0', name: 'Network Infrastructure', visible: true },
      { id: 'layer_1', name: 'Audio Signal Path', visible: true }
    ];
    
    let selectedNodeId = null;
    let selectedConnId = null;
    let connectingPort = null;
    let dragNodeId = null;
    let currentTheme = 'dark';
    
    // Canvas Viewport State
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let snapToGrid = true;
    const GRID_SIZE = 28;

    // A/V Component Library
    const componentLibrary = [
      { type: 'Network Switch', color: '#00e5ff' },
      { type: 'Audio Mixer', color: '#9d4edd' },
      { type: 'Computer / PC', color: '#ff006e' },
      { type: 'Display / Monitor', color: '#3a86ff' },
      { type: 'Speaker Array', color: '#fb5607' },
      { type: 'Microphone RX', color: '#ffbe0b' },
      { type: 'Patch Panel', color: '#8b9bb4' }
    ];

    // DOM Elements
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const svgLayer = document.getElementById('svg-layer');
    const dragLine = document.getElementById('drag-line');
    const searchInput = document.getElementById('node-search');
    const searchDropdown = document.getElementById('search-dropdown');
    const layersListEl = document.getElementById('layers-list');

    function init() {
      renderLayers();
      setupSearch();
      setupViewportControls();
      
      // Default initial layout
      createNode('Network Switch', layers[0].id, 140, 140);
      createNode('Audio Mixer', layers[1].id, 440, 140);
    }

    // --- Theme Toggle ---
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('btn-theme').innerText = currentTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    // --- Viewport & Canvas Pan / Zoom ---
    function setupViewportControls() {
      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.001;
        const delta = -e.deltaY * zoomIntensity;
        let newScale = Math.min(Math.max(0.2, scale + delta), 3);
        
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        scale = newScale;
        
        applyTransform();
      }, { passive: false });

      viewport.addEventListener('mousedown', (e) => {
        if (e.button === 1 || (e.button === 0 && e.target === viewport)) {
          isPanning = true;
          viewport.style.cursor = 'grabbing';
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (isPanning) {
          panX += e.movementX;
          panY += e.movementY;
          applyTransform();
        }
        
        if (dragNodeId) {
          const node = nodes.find(n => n.id === dragNodeId);
          node.x += e.movementX / scale;
          node.y += e.movementY / scale;
          updateNodePositionDOM(node);
          updateConnections();
        }

        if (connectingPort) {
          const rect = viewport.getBoundingClientRect();
          const mouseX = (e.clientX - rect.left - panX) / scale;
          const mouseY = (e.clientY - rect.top - panY) / scale;
          
          const dx = Math.abs(mouseX - connectingPort.x) * 0.5;
          const pathD = connectingPort.type === 'output' 
            ? `M ${connectingPort.x} ${connectingPort.y} C ${connectingPort.x + dx} ${connectingPort.y}, ${mouseX - dx} ${mouseY}, ${mouseX} ${mouseY}`
            : `M ${mouseX} ${mouseY} C ${mouseX + dx} ${mouseY}, ${connectingPort.x - dx} ${connectingPort.y}, ${connectingPort.x} ${connectingPort.y}`;
          
          dragLine.setAttribute('d', pathD);
        }
      });

      window.addEventListener('mouseup', (e) => {
        isPanning = false;
        viewport.style.cursor = 'grab';
        
        if (dragNodeId && snapToGrid) {
          const node = nodes.find(n => n.id === dragNodeId);
          node.x = Math.round(node.x / GRID_SIZE) * GRID_SIZE;
          node.y = Math.round(node.y / GRID_SIZE) * GRID_SIZE;
          updateNodePositionDOM(node);
          updateConnections();
        }
        dragNodeId = null;

        if (connectingPort) {
          const targetPort = e.target.closest('.port');
          if (targetPort && targetPort.dataset.node !== connectingPort.nodeId && targetPort.dataset.port !== connectingPort.type) {
            const fromId = connectingPort.type === 'output' ? connectingPort.nodeId : targetPort.dataset.node;
            const toId = connectingPort.type === 'output' ? targetPort.dataset.node : connectingPort.nodeId;
            createConnection(fromId, toId);
          }
          connectingPort = null;
          dragLine.style.display = 'none';
        }
      });
    }

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      viewport.style.backgroundPosition = `${panX}px ${panY}px`;
      viewport.style.backgroundSize = `${GRID_SIZE * scale}px ${GRID_SIZE * scale}px`;
    }

    function resetView() {
      scale = 1; panX = 0; panY = 0;
      applyTransform();
    }

    // --- Search & Device Spawning ---
    function setupSearch() {
      const renderResults = (query) => {
        searchDropdown.innerHTML = '';
        const filtered = componentLibrary.filter(c => c.type.toLowerCase().includes(query.toLowerCase()));
        if (filtered.length === 0) searchDropdown.innerHTML = '<div class="search-item">No devices found</div>';
        
        filtered.forEach(comp => {
          const div = document.createElement('div');
          div.className = 'search-item';
          div.innerHTML = `<div class="color-dot" style="background:${comp.color}"></div> ${comp.type}`;
          div.onmousedown = () => {
            const viewCenterX = (-panX + viewport.clientWidth / 2) / scale;
            const viewCenterY = (-panY + viewport.clientHeight / 2) / scale;
            createNode(comp.type, layers[0].id, viewCenterX - 100, viewCenterY - 40, comp.color);
            searchInput.value = '';
            searchDropdown.classList.remove('active');
          };
          searchDropdown.appendChild(div);
        });
      };

      searchInput.addEventListener('focus', () => { searchDropdown.classList.add('active'); renderResults(searchInput.value); });
      searchInput.addEventListener('input', (e) => renderResults(e.target.value));
      searchInput.addEventListener('blur', () => setTimeout(() => searchDropdown.classList.remove('active'), 150));
    }

    // --- Grid Controls ---
    function toggleGrid() {
      snapToGrid = !snapToGrid;
      document.getElementById('btn-grid').classList.toggle('active', snapToGrid);
    }

    function snapAllNodes() {
      nodes.forEach(n => {
        n.x = Math.round(n.x / GRID_SIZE) * GRID_SIZE;
        n.y = Math.round(n.y / GRID_SIZE) * GRID_SIZE;
        updateNodePositionDOM(n);
      });
      updateConnections();
    }

    // --- Layer Controls ---
    function renderLayers() {
      layersListEl.innerHTML = '';
      layers.forEach(layer => {
        const div = document.createElement('div');
        div.className = `layer-item ${layer.visible ? '' : 'hidden-layer'}`;
        div.innerHTML = `
          <button class="toggle" onclick="toggleLayer('${layer.id}')">${layer.visible ? '👁' : '🕶'}</button>
          <input type="text" value="${layer.name}" onchange="updateLayerName('${layer.id}', this.value)">
        `;
        layersListEl.appendChild(div);
      });
      refreshVisibility();
    }

    function addLayer() {
      layers.push({ id: 'layer_' + Date.now(), name: 'New System Layer', visible: true });
      renderLayers();
    }

    function toggleLayer(id) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.visible = !layer.visible;
      renderLayers();
    }

    function updateLayerName(id, name) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.name = name;
      if (selectedNodeId) selectNode(selectedNodeId);
    }

    function refreshVisibility() {
      nodes.forEach(node => {
        const layer = layers.find(l => l.id === node.layerId);
        const el = document.getElementById(node.id);
        if (el) {
          if (layer && !layer.visible) el.classList.add('hidden');
          else el.classList.remove('hidden');
        }
      });
      updateConnections();
    }

    // --- Node Creation & Rendering ---
    function createNode(type, layerId, x, y, color) {
      if (!color) {
        const libItem = componentLibrary.find(c => c.type === type);
        color = libItem ? libItem.color : '#8b9bb4';
      }
      
      if (snapToGrid) {
        x = Math.round(x / GRID_SIZE) * GRID_SIZE;
        y = Math.round(y / GRID_SIZE) * GRID_SIZE;
      }

      const id = 'node_' + Date.now();
      const node = { id, type, layerId, label: type, color, x, y, ip: '192.168.1.' + Math.floor(Math.random()*200 + 10) };
      nodes.push(node);
      renderNodeToDOM(node);
      selectNode(id);
    }

    function renderNodeToDOM(node) {
      const el = document.createElement('div');
      el.className = 'node';
      el.id = node.id;
      
      el.innerHTML = `
        <div class="node-header" style="border-top: 3px solid ${node.color}">
          <div style="width:8px; height:8px; border-radius:50%; background:${node.color}"></div>
          <span class="lbl">${node.label}</span>
        </div>
        <div class="node-body">
          <div>IP/ID <span class="ip-tag">${node.ip}</span></div>
        </div>
        <div class="node-ports">
          <div class="port input" data-node="${node.id}" data-port="input"></div>
          <div class="port output" data-node="${node.id}" data-port="output"></div>
        </div>
      `;

      el.querySelector('.node-header').addEventListener('mousedown', (e) => {
        dragNodeId = node.id;
        selectNode(node.id);
        e.stopPropagation();
      });

      el.addEventListener('mousedown', () => selectNode(node.id));

      el.querySelectorAll('.port').forEach(port => {
        port.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          const rect = port.getBoundingClientRect();
          const viewRect = canvas.getBoundingClientRect();
          
          connectingPort = {
            nodeId: node.id,
            type: port.dataset.port,
            x: (rect.left - viewRect.left + rect.width / 2) / scale,
            y: (rect.top - viewRect.top + rect.height / 2) / scale
          };
          dragLine.style.display = 'block';
        });
      });

      canvas.appendChild(el);
      updateNodePositionDOM(node);
      refreshVisibility();
    }

    function updateNodePositionDOM(node) {
      const el = document.getElementById(node.id);
      if (el) {
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
      }
    }

    // --- Cable Connections ---
    function createConnection(fromId, toId) {
      if (connections.some(c => c.from === fromId && c.to === toId)) return;
      connections.push({ id: 'conn_' + Date.now(), from: fromId, to: toId });
      updateConnections();
    }

    function updateConnections() {
      svgLayer.querySelectorAll('.connector').forEach(el => el.remove());

      connections.forEach(conn => {
        const fromNode = nodes.find(n => n.id === conn.from);
        const toNode = nodes.find(n => n.id === conn.to);
        
        const fromLayer = layers.find(l => l.id === fromNode?.layerId);
        const toLayer = layers.find(l => l.id === toNode?.layerId);
        if ((fromLayer && !fromLayer.visible) || (toLayer && !toLayer.visible)) return;

        const fromEl = document.querySelector(`#${conn.from} .port.output`);
        const toEl = document.querySelector(`#${conn.to} .port.input`);

        if (fromEl && toEl) {
          const viewRect = canvas.getBoundingClientRect();
          const rA = fromEl.getBoundingClientRect();
          const rB = toEl.getBoundingClientRect();

          const x1 = (rA.left - viewRect.left + rA.width / 2) / scale;
          const y1 = (rA.top - viewRect.top + rA.height / 2) / scale;
          const x2 = (rB.left - viewRect.left + rB.width / 2) / scale;
          const y2 = (rB.top - viewRect.top + rB.height / 2) / scale;

          const dx = Math.abs(x2 - x1) * 0.5;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
          path.setAttribute('class', `connector ${selectedConnId === conn.id ? 'selected' : ''}`);
          
          path.onmousedown = (e) => { e.stopPropagation(); selectConnection(conn.id); };
          svgLayer.appendChild(path);
        }
      });
    }

    // --- Inspector ---
    function selectNode(id) {
      selectedNodeId = id;
      selectedConnId = null;
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
      document.getElementById(id)?.classList.add('selected');
      updateConnections();

      const node = nodes.find(n => n.id === id);
      if (!node) return;

      const layerOpts = layers.map(l => `<option value="${l.id}" ${l.id === node.layerId ? 'selected' : ''}>${l.name}</option>`).join('');

      document.getElementById('inspector-content').innerHTML = `
        <div class="field">
          <label>Device Name</label>
          <input type="text" value="${node.label}" oninput="updateProp('${id}', 'label', this.value)">
        </div>
        <div class="field">
          <label>IP / ID Address</label>
          <input type="text" value="${node.ip}" oninput="updateProp('${id}', 'ip', this.value)">
        </div>
        <div class="field">
          <label>Assigned System Layer</label>
          <select onchange="updateProp('${id}', 'layerId', this.value)">${layerOpts}</select>
        </div>
        <button onclick="deleteNode('${id}')" style="margin-top:12px; width:100%; border-color:var(--accent-pink); color:var(--accent-pink);">Remove Device</button>
      `;
    }

    function selectConnection(id) {
      selectedConnId = id;
      selectedNodeId = null;
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
      updateConnections();

      document.getElementById('inspector-content').innerHTML = `
        <div class="field"><label>Cable Connection</label><span style="font-size:0.8rem;">Active Signal Routing Path</span></div>
        <button onclick="deleteConnection('${id}')" style="margin-top:12px; width:100%; border-color:var(--accent-pink); color:var(--accent-pink);">Remove Cable Path</button>
      `;
    }

    function updateProp(id, prop, val) {
      const node = nodes.find(n => n.id === id);
      if (node) {
        node[prop] = val;
        const el = document.getElementById(id);
        if (prop === 'label') el.querySelector('.lbl').innerText = val;
        if (prop === 'ip') el.querySelector('.ip-tag').innerText = val;
        if (prop === 'layerId') refreshVisibility();
      }
    }

    // --- Deletions & Canvas Management ---
    function deleteNode(id) {
      nodes = nodes.filter(n => n.id !== id);
      connections = connections.filter(c => c.from !== id && c.to !== id);
      document.getElementById(id)?.remove();
      clearInspector();
      updateConnections();
    }

    function deleteConnection(id) {
      connections = connections.filter(c => c.id !== id);
      clearInspector();
      updateConnections();
    }

    function clearInspector() {
      selectedNodeId = null; selectedConnId = null;
      document.getElementById('inspector-content').innerHTML = '<div style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 2rem;">Select a node or connection.</div>';
    }

    function clearCanvas(confirmPrompt = true) {
      if (!confirmPrompt || confirm('Clear entire schematic?')) {
        nodes = []; connections = [];
        document.querySelectorAll('.node').forEach(n => n.remove());
        updateConnections(); clearInspector();
      }
    }

    // --- Import & Export JSON ---
    function exportJSON() {
      const schematicData = {
        version: "2026.1",
        timestamp: new Date().toISOString(),
        layers,
        nodes,
        connections,
        viewport: { scale, panX, panY }
      };

      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(schematicData, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `node-labs-design-${Date.now()}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function importJSON() {
      document.getElementById('file-input').click();
    }

    function handleFileSelect(evt) {
      const file = evt.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          clearCanvas(false);
          
          layers = data.layers || [];
          nodes = data.nodes || [];
          connections = data.connections || [];
          
          if (data.viewport) {
            scale = data.viewport.scale || 1;
            panX = data.viewport.panX || 0;
            panY = data.viewport.panY || 0;
            applyTransform();
          }

          renderLayers();
          nodes.forEach(node => renderNodeToDOM(node));
          updateConnections();
        } catch (err) {
          alert('Failed to parse schematic file. Please select a valid Node Labs JSON export.');
        }
      };
      reader.readAsText(file);
      evt.target.value = '';
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (selectedNodeId) deleteNode(selectedNodeId);
        else if (selectedConnId) deleteConnection(selectedConnId);
      }
    });

    window.onload = init;
  </script>
</body>
</html>
