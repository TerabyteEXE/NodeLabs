<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Labs - Pro A/V & Unreal System Builder</title>
  <style>
    /* --- CSS Variables --- */
    :root[data-theme="dark"] {
      --bg-base: #090b10;
      --bg-panel: #121520;
      --bg-node: #1a1e2e;
      --bg-node-header: #22283d;
      --border-subtle: #293047;
      --border-active: #3a86ff;
      
      --accent-cyan: #00e5ff;
      --accent-purple: #9d4edd;
      --accent-blue: #3a86ff;
      --accent-pink: #ff006e;
      --accent-gold: #ffb703;
      
      --text-main: #e2e8f0;
      --text-muted: #8493ad;
      --grid-dot: #252a3d;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    :root[data-theme="light"] {
      --bg-base: #f1f4f9;
      --bg-panel: #ffffff;
      --bg-node: #ffffff;
      --bg-node-header: #f0f4f8;
      --border-subtle: #cbd5e1;
      --border-active: #2563eb;
      
      --accent-cyan: #0284c7;
      --accent-purple: #7e22ce;
      --accent-blue: #2563eb;
      --accent-pink: #e11d48;
      --accent-gold: #d97706;
      
      --text-main: #0f172a;
      --text-muted: #64748b;
      --grid-dot: #cbd5e1;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none; 
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Toolbar Header --- */
    header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      height: 56px;
      box-shadow: 0 2px 10px var(--shadow);
    }

    .brand { 
      font-size: 0.95rem; 
      font-weight: 800; 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      letter-spacing: -0.3px;
    }
    .brand span { 
      font-size: 0.65rem; 
      color: var(--accent-cyan); 
      background: rgba(0, 229, 255, 0.1); 
      border: 1px solid var(--border-subtle);
      padding: 2px 6px; 
      border-radius: 4px; 
      font-weight: 600;
    }

    .toolbar-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-wrapper { position: relative; }
    .search-wrapper input {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 6px;
      width: 240px;
      outline: none;
      font-size: 0.8rem;
    }
    .search-wrapper input:focus { 
      border-color: var(--accent-blue); 
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.15);
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px); 
      left: 0; right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      max-height: 260px;
      overflow-y: auto;
      display: none;
      z-index: 200;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .search-dropdown.active { display: block; }
    .search-item {
      padding: 8px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--bg-base);
    }
    .search-item:hover { background: var(--bg-node-header); }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; }

    .btn-group { display: flex; gap: 6px; align-items: center; }
    
    button {
      background: var(--bg-node);
      color: var(--text-main);
      border: 1px solid var(--border-subtle);
      padding: 6px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    button:hover { 
      background: var(--bg-node-header); 
      border-color: var(--border-active);
    }
    button.active { 
      background: var(--accent-blue); 
      border-color: var(--accent-blue); 
      color: #ffffff; 
    }

    /* --- Workspace Layout --- */
    .app-container {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      background-color: var(--bg-base);
      background-image: radial-gradient(circle, var(--grid-dot) 1.2px, transparent 1.2px);
      background-size: 28px 28px;
    }
    #viewport:active { cursor: grabbing; }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #svg-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* --- UE5 Style Backdrop --- */
    .backdrop {
      position: absolute;
      border: 2px dashed var(--border-subtle);
      border-radius: 10px;
      pointer-events: auto;
      z-index: 1;
      display: flex;
      flex-direction: column;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
    }
    .backdrop-header {
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: grab;
      border-radius: 8px 8px 0 0;
      background: rgba(255,255,255,0.03);
      display: flex;
      justify-content: space-between;
    }
    .backdrop-header:active { cursor: grabbing; }
    .backdrop-resize {
      position: absolute;
      right: 0; bottom: 0;
      width: 16px; height: 16px;
      cursor: nwse-resize;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      border-radius: 0 0 8px 0;
    }

    /* --- Nodes --- */
    .node {
      position: absolute;
      width: 220px;
      background: var(--bg-node);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      cursor: default;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px var(--shadow);
      z-index: 10;
      min-height: 100px;
    }
    
    .node.selected { 
      border-color: var(--accent-blue); 
      box-shadow: 0 0 0 2px var(--accent-blue), 0 8px 24px var(--shadow);
    }
    .node.highlighted {
      border-color: var(--accent-gold) !important;
      box-shadow: 0 0 15px var(--accent-gold) !important;
    }
    .node.hidden { display: none; }

    .node-header {
      padding: 8px 10px;
      background: var(--bg-node-header);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 7px 7px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: grab;
    }
    .node-header:active { cursor: grabbing; }

    .node-title-group { display: flex; align-items: center; gap: 8px; }
    .star-icon { color: var(--accent-gold); font-size: 0.85rem; display: none; }
    .node.starred .star-icon { display: inline; }

    .node-body {
      padding: 10px;
      font-size: 0.73rem;
      color: var(--text-muted);
      flex: 1;
    }
    .node-body div { margin-bottom: 4px; display: flex; justify-content: space-between; }
    .node-body span { color: var(--text-main); font-weight: 500; }

    /* Ports Container & Dynamic Positioning */
    .port-column {
      position: absolute;
      top: 36px;
      bottom: 0;
      width: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      pointer-events: none;
    }
    .port-column.left { left: -7px; }
    .port-column.right { right: -7px; }

    .port {
      width: 12px; height: 12px;
      background: var(--bg-panel);
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      cursor: crosshair;
      pointer-events: auto;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }
    .port:hover { 
      transform: scale(1.4); 
      border-color: var(--accent-cyan); 
      background: var(--accent-cyan); 
    }

    /* --- Cables --- */
    path.connector {
      stroke: var(--accent-blue);
      stroke-width: 2.5px;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
      stroke-dasharray: 6, 6;
      animation: signalFlow 1s linear infinite;
    }
    
    @keyframes signalFlow {
      from { stroke-dashoffset: 12; }
      to { stroke-dashoffset: 0; }
    }

    path.connector:hover, path.connector.selected { 
      stroke: var(--accent-pink); 
      stroke-width: 4px; 
    }

    path.drag-line {
      stroke: var(--accent-cyan);
      stroke-width: 2px;
      fill: none;
      stroke-dasharray: 4, 4;
    }

    /* --- Sidebar Inspector --- */
    aside {
      width: 290px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      z-index: 20;
      box-shadow: -2px 0 10px var(--shadow);
    }

    .panel-section {
      padding: 1rem;
      border-bottom: 1px solid var(--border-subtle);
      overflow-y: auto;
    }
    .panel-section h3 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.68rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
    .field input, .field select {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      color: var(--text-main);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.78rem;
      outline: none;
    }
    .field-row { display: flex; gap: 8px; }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--bg-node);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.78rem;
    }
    .layer-item input[type="text"] {
      background: transparent;
      border: none;
      color: var(--text-main);
      flex: 1;
      outline: none;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="brand">Node Labs <span>PRO</span></div>
    
    <div class="toolbar-section">
      <div class="search-wrapper">
        <input type="text" id="node-search" placeholder="🔍 Add device (Switch, Mixer...)" autocomplete="off">
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>
      
      <div class="btn-group">
        <button onclick="addBackdrop()">+ Backdrop</button>
        <button id="btn-grid" class="active" onclick="toggleGrid()">Grid Snap</button>
        <button onclick="snapAllNodes()">Align All</button>
      </div>
    </div>

    <div class="toolbar-section">
      <div class="btn-group">
        <button onclick="exportJSON()">💾 Save</button>
        <button onclick="importJSON()">📂 Open</button>
        <button id="btn-theme" onclick="toggleTheme()">☀️ Light</button>
        <button onclick="resetView()">🎯 Center</button>
        <button onclick="clearCanvas()" style="color: var(--accent-pink);">Clear</button>
      </div>
    </div>
  </header>

  <div class="app-container">
    <div id="viewport">
      <div id="canvas">
        <svg id="svg-layer">
          <path id="drag-line" class="drag-line" d="" style="display:none;"></path>
        </svg>
      </div>
    </div>

    <aside>
      <div class="panel-section" style="flex: 0.4;">
        <h3>Layers <button onclick="addLayer()">+ Add</button></h3>
        <div id="layers-list"></div>
      </div>
      
      <div class="panel-section" style="flex: 1;">
        <h3>Inspector</h3>
        <div id="inspector-content">
          <div style="font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-top: 2rem;">Select a node, backdrop, or cable to inspect.</div>
        </div>
      </div>
    </aside>
  </div>

  <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)">

  <script>
    // --- State Management ---
    let nodes = [];
    let backdrops = [];
    let connections = [];
    let layers = [
      { id: 'layer_0', name: 'Infrastructure Layer', visible: true },
      { id: 'layer_1', name: 'Audio Signal Path', visible: true }
    ];
    
    let selectedNodeId = null;
    let selectedBackdropId = null;
    let selectedConnId = null;
    
    let connectingPort = null;
    let dragNodeId = null;
    let dragBackdrop = null;
    let resizingBackdrop = null;
    
    let currentTheme = 'dark';
    let scale = 1, panX = 0, panY = 0;
    let isPanning = false;
    let snapToGrid = true;
    const GRID_SIZE = 28;

    const componentLibrary = [
      { type: 'Network Switch', color: '#00e5ff', inPorts: 2, outPorts: 8 },
      { type: 'Audio Mixer', color: '#9d4edd', inPorts: 4, outPorts: 4 },
      { type: 'Computer / PC', color: '#ff006e', inPorts: 1, outPorts: 2 },
      { type: 'Display / Monitor', color: '#3a86ff', inPorts: 2, outPorts: 0 },
      { type: 'Speaker Array', color: '#fb5607', inPorts: 1, outPorts: 0 },
      { type: 'Microphone RX', color: '#ffbe0b', inPorts: 0, outPorts: 2 }
    ];

    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const svgLayer = document.getElementById('svg-layer');
    const dragLine = document.getElementById('drag-line');
    const searchInput = document.getElementById('node-search');
    const searchDropdown = document.getElementById('search-dropdown');
    const layersListEl = document.getElementById('layers-list');

    function init() {
      renderLayers();
      setupSearch();
      setupViewportControls();
      
      // Default starting state
      addBackdrop('Audio Rack Group', 100, 100, 420, 260, '#9d4edd');
      createNode('Network Switch', layers[0].id, 140, 150, '#00e5ff', 2, 8);
      createNode('Audio Mixer', layers[1].id, 460, 150, '#9d4edd', 4, 4);
    }

    // --- Theme & Viewport Controls ---
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('btn-theme').innerText = currentTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function setupViewportControls() {
      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = -e.deltaY * 0.001;
        let newScale = Math.min(Math.max(0.25, scale + delta), 2.5);
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        scale = newScale;
        applyTransform();
      }, { passive: false });

      viewport.addEventListener('mousedown', (e) => {
        if (e.button === 1 || (e.button === 0 && e.target === viewport)) {
          isPanning = true;
          viewport.style.cursor = 'grabbing';
          deselectAll();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (isPanning) {
          panX += e.movementX;
          panY += e.movementY;
          applyTransform();
        }
        
        if (dragNodeId) {
          const node = nodes.find(n => n.id === dragNodeId);
          node.x += e.movementX / scale;
          node.y += e.movementY / scale;
          updateNodePositionDOM(node);
          updateConnections();
        }

        if (dragBackdrop) {
          const bd = backdrops.find(b => b.id === dragBackdrop.id);
          const dx = e.movementX / scale;
          const dy = e.movementY / scale;
          bd.x += dx;
          bd.y += dy;
          
          // Move internal nodes along with backdrop
          nodes.forEach(n => {
            if (n.x >= dragBackdrop.initialX && n.x <= dragBackdrop.initialX + bd.w &&
                n.y >= dragBackdrop.initialY && n.y <= dragBackdrop.initialY + bd.h) {
              n.x += dx;
              n.y += dy;
              updateNodePositionDOM(n);
            }
          });
          dragBackdrop.initialX += dx;
          dragBackdrop.initialY += dy;
          updateBackdropDOM(bd);
          updateConnections();
        }

        if (resizingBackdrop) {
          const bd = backdrops.find(b => b.id === resizingBackdrop);
          bd.w = Math.max(150, bd.w + e.movementX / scale);
          bd.h = Math.max(100, bd.h + e.movementY / scale);
          updateBackdropDOM(bd);
        }

        if (connectingPort) {
          const rect = viewport.getBoundingClientRect();
          const mouseX = (e.clientX - rect.left - panX) / scale;
          const mouseY = (e.clientY - rect.top - panY) / scale;
          
          const dx = Math.abs(mouseX - connectingPort.x) * 0.5;
          const pathD = connectingPort.type === 'output' 
            ? `M ${connectingPort.x} ${connectingPort.y} C ${connectingPort.x + dx} ${connectingPort.y}, ${mouseX - dx} ${mouseY}, ${mouseX} ${mouseY}`
            : `M ${mouseX} ${mouseY} C ${mouseX + dx} ${mouseY}, ${connectingPort.x - dx} ${connectingPort.y}, ${connectingPort.x} ${connectingPort.y}`;
          
          dragLine.setAttribute('d', pathD);
        }
      });

      window.addEventListener('mouseup', (e) => {
        isPanning = false;
        viewport.style.cursor = 'grab';
        
        if (dragNodeId && snapToGrid) {
          const node = nodes.find(n => n.id === dragNodeId);
          node.x = Math.round(node.x / GRID_SIZE) * GRID_SIZE;
          node.y = Math.round(node.y / GRID_SIZE) * GRID_SIZE;
          updateNodePositionDOM(node);
          updateConnections();
        }
        dragNodeId = null;
        dragBackdrop = null;
        resizingBackdrop = null;

        if (connectingPort) {
          const targetPort = e.target.closest('.port');
          if (targetPort && targetPort.dataset.node !== connectingPort.nodeId && targetPort.dataset.port !== connectingPort.type) {
            const fromId = connectingPort.type === 'output' ? connectingPort.nodeId : targetPort.dataset.node;
            const fromIdx = connectingPort.type === 'output' ? connectingPort.index : targetPort.dataset.index;
            const toId = connectingPort.type === 'output' ? targetPort.dataset.node : connectingPort.nodeId;
            const toIdx = connectingPort.type === 'output' ? targetPort.dataset.index : connectingPort.index;
            
            createConnection(fromId, fromIdx, toId, toIdx);
          }
          connectingPort = null;
          dragLine.style.display = 'none';
        }
      });
    }

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      viewport.style.backgroundPosition = `${panX}px ${panY}px`;
      viewport.style.backgroundSize = `${GRID_SIZE * scale}px ${GRID_SIZE * scale}px`;
    }

    function resetView() {
      scale = 1; panX = 0; panY = 0;
      applyTransform();
    }

    function deselectAll() {
      selectedNodeId = null;
      selectedBackdropId = null;
      selectedConnId = null;
      document.querySelectorAll('.node, .connector').forEach(el => el.classList.remove('selected'));
      renderInspector();
    }

    // --- Dynamic Search ---
    function setupSearch() {
      const renderResults = (query) => {
        searchDropdown.innerHTML = '';
        const filtered = componentLibrary.filter(c => c.type.toLowerCase().includes(query.toLowerCase()));
        if (filtered.length === 0) searchDropdown.innerHTML = '<div class="search-item">No devices found</div>';
        
        filtered.forEach(comp => {
          const div = document.createElement('div');
          div.className = 'search-item';
          div.innerHTML = `<div class="color-dot" style="background:${comp.color}"></div> ${comp.type}`;
          div.onmousedown = () => {
            const viewCenterX = (-panX + viewport.clientWidth / 2) / scale;
            const viewCenterY = (-panY + viewport.clientHeight / 2) / scale;
            createNode(comp.type, layers[0].id, viewCenterX - 100, viewCenterY - 40, comp.color, comp.inPorts, comp.outPorts);
            searchInput.value = '';
            searchDropdown.classList.remove('active');
          };
          searchDropdown.appendChild(div);
        });
      };

      searchInput.addEventListener('focus', () => { searchDropdown.classList.add('active'); renderResults(searchInput.value); });
      searchInput.addEventListener('input', (e) => renderResults(e.target.value));
      searchInput.addEventListener('blur', () => setTimeout(() => searchDropdown.classList.remove('active'), 150));
    }

    // --- UE5 Backdrop Features ---
    function addBackdrop(title = 'System Zone', x = 200, y = 200, w = 300, h = 200, color = '#3a86ff') {
      const id = 'bd_' + Date.now();
      const bd = { id, title, x, y, w, h, color };
      backdrops.push(bd);
      renderBackdropToDOM(bd);
      selectBackdrop(id);
    }

    function renderBackdropToDOM(bd) {
      const el = document.createElement('div');
      el.className = 'backdrop';
      el.id = bd.id;
      el.innerHTML = `
        <div class="backdrop-header">
          <span class="bd-title">${bd.title}</span>
        </div>
        <div class="backdrop-resize"></div>
      `;

      const header = el.querySelector('.backdrop-header');
      header.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        dragBackdrop = { id: bd.id, initialX: bd.x, initialY: bd.y };
        selectBackdrop(bd.id);
      });

      const resizer = el.querySelector('.backdrop-resize');
      resizer.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        resizingBackdrop = bd.id;
      });

      canvas.appendChild(el);
      updateBackdropDOM(bd);
    }

    function updateBackdropDOM(bd) {
      const el = document.getElementById(bd.id);
      if (el) {
        el.style.left = bd.x + 'px';
        el.style.top = bd.y + 'px';
        el.style.width = bd.w + 'px';
        el.style.height = bd.h + 'px';
        el.style.borderColor = bd.color;
        el.querySelector('.backdrop-header').style.color = bd.color;
      }
    }

    // --- Nodes Management & Mounting Points ---
    function createNode(type, layerId, x, y, color, inPorts = 1, outPorts = 1) {
      if (snapToGrid) {
        x = Math.round(x / GRID_SIZE) * GRID_SIZE;
        y = Math.round(y / GRID_SIZE) * GRID_SIZE;
      }

      const id = 'node_' + Date.now();
      const node = { 
        id, type, layerId, label: type, color, x, y, 
        inPorts: parseInt(inPorts), outPorts: parseInt(outPorts),
        starred: false, highlighted: false,
        ip: '192.168.1.' + Math.floor(Math.random()*200 + 10) 
      };
      nodes.push(node);
      renderNodeToDOM(node);
      selectNode(id);
    }

    function renderNodeToDOM(node) {
      const el = document.createElement('div');
      el.className = `node ${node.starred ? 'starred' : ''} ${node.highlighted ? 'highlighted' : ''}`;
      el.id = node.id;
      
      let inPortsHTML = '';
      for (let i = 0; i < node.inPorts; i++) {
        inPortsHTML += `<div class="port input" data-node="${node.id}" data-port="input" data-index="${i}" title="Input ${i+1}"></div>`;
      }

      let outPortsHTML = '';
      for (let j = 0; j < node.outPorts; j++) {
        outPortsHTML += `<div class="port output" data-node="${node.id}" data-port="output" data-index="${j}" title="Output ${j+1}"></div>`;
      }

      el.innerHTML = `
        <div class="node-header" style="border-top: 3px solid ${node.color}">
          <div class="node-title-group">
            <span class="star-icon">★</span>
            <span class="lbl">${node.label}</span>
          </div>
          <div style="width:8px; height:8px; border-radius:50%; background:${node.color}"></div>
        </div>
        <div class="node-body">
          <div>IP/ID <span class="ip-tag">${node.ip}</span></div>
          <div>PORTS <span>${node.inPorts} IN / ${node.outPorts} OUT</span></div>
        </div>
        <div class="port-column left">${inPortsHTML}</div>
        <div class="port-column right">${outPortsHTML}</div>
      `;

      el.querySelector('.node-header').addEventListener('mousedown', (e) => {
        dragNodeId = node.id;
        selectNode(node.id);
        e.stopPropagation();
      });

      el.addEventListener('mousedown', () => selectNode(node.id));

      el.querySelectorAll('.port').forEach(port => {
        port.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          const rect = port.getBoundingClientRect();
          const viewRect = canvas.getBoundingClientRect();
          
          connectingPort = {
            nodeId: node.id,
            type: port.dataset.port,
            index: port.dataset.index,
            x: (rect.left - viewRect.left + rect.width / 2) / scale,
            y: (rect.top - viewRect.top + rect.height / 2) / scale
          };
          dragLine.style.display = 'block';
        });
      });

      canvas.appendChild(el);
      updateNodePositionDOM(node);
      refreshVisibility();
    }

    function updateNodePositionDOM(node) {
      const el = document.getElementById(node.id);
      if (el) {
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
      }
    }

    // --- Cable Connections ---
    function createConnection(fromId, fromIdx, toId, toIdx) {
      if (connections.some(c => c.from === fromId && c.fromIdx === fromIdx && c.to === toId && c.toIdx === toIdx)) return;
      connections.push({ id: 'conn_' + Date.now(), from: fromId, fromIdx, to: toId, toIdx });
      updateConnections();
    }

    function updateConnections() {
      svgLayer.querySelectorAll('.connector').forEach(el => el.remove());

      connections.forEach(conn => {
        const fromNode = nodes.find(n => n.id === conn.from);
        const toNode = nodes.find(n => n.id === conn.to);
        
        const fromLayer = layers.find(l => l.id === fromNode?.layerId);
        const toLayer = layers.find(l => l.id === toNode?.layerId);
        if ((fromLayer && !fromLayer.visible) || (toLayer && !toLayer.visible)) return;

        const fromEl = document.querySelector(`#${conn.from} .port.output[data-index="${conn.fromIdx}"]`);
        const toEl = document.querySelector(`#${conn.to} .port.input[data-index="${conn.toIdx}"]`);

        if (fromEl && toEl) {
          const viewRect = canvas.getBoundingClientRect();
          const rA = fromEl.getBoundingClientRect();
          const rB = toEl.getBoundingClientRect();

          const x1 = (rA.left - viewRect.left + rA.width / 2) / scale;
          const y1 = (rA.top - viewRect.top + rA.height / 2) / scale;
          const x2 = (rB.left - viewRect.left + rB.width / 2) / scale;
          const y2 = (rB.top - viewRect.top + rB.height / 2) / scale;

          const dx = Math.abs(x2 - x1) * 0.5;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
          path.setAttribute('class', `connector ${selectedConnId === conn.id ? 'selected' : ''}`);
          
          path.onmousedown = (e) => { e.stopPropagation(); selectConnection(conn.id); };
          svgLayer.appendChild(path);
        }
      });
    }

    // --- Inspector Panels ---
    function selectNode(id) {
      deselectAll();
      selectedNodeId = id;
      document.getElementById(id)?.classList.add('selected');
      renderInspector();
    }

    function selectBackdrop(id) {
      deselectAll();
      selectedBackdropId = id;
      renderInspector();
    }

    function selectConnection(id) {
      deselectAll();
      selectedConnId = id;
      updateConnections();
      renderInspector();
    }

    function renderInspector() {
      const container = document.getElementById('inspector-content');
      
      if (selectedNodeId) {
        const node = nodes.find(n => n.id === selectedNodeId);
        const layerOpts = layers.map(l => `<option value="${l.id}" ${l.id === node.layerId ? 'selected' : ''}>${l.name}</option>`).join('');

        container.innerHTML = `
          <div class="field">
            <label>Device Name</label>
            <input type="text" value="${node.label}" oninput="updateNodeProp('${node.id}', 'label', this.value)">
          </div>
          <div class="field">
            <label>IP / ID Address</label>
            <input type="text" value="${node.ip}" oninput="updateNodeProp('${node.id}', 'ip', this.value)">
          </div>
          <div class="field">
            <label>Header Accent Color</label>
            <input type="color" value="${node.color}" onchange="updateNodeProp('${node.id}', 'color', this.value)">
          </div>
          <div class="field-row">
            <div class="field" style="flex:1;">
              <label>IN Ports</label>
              <input type="number" min="0" max="16" value="${node.inPorts}" onchange="updateNodeProp('${node.id}', 'inPorts', this.value)">
            </div>
            <div class="field" style="flex:1;">
              <label>OUT Ports</label>
              <input type="number" min="0" max="16" value="${node.outPorts}" onchange="updateNodeProp('${node.id}', 'outPorts', this.value)">
            </div>
          </div>
          <div class="field">
            <label>Layer</label>
            <select onchange="updateNodeProp('${node.id}', 'layerId', this.value)">${layerOpts}</select>
          </div>
          <div class="field-row" style="margin-top:10px;">
            <button onclick="toggleStar('${node.id}')" style="flex:1;">${node.starred ? '★ Unstar' : '☆ Star Node'}</button>
            <button onclick="toggleHighlight('${node.id}')" style="flex:1;">${node.highlighted ? 'Unhighlight' : '⚡ Highlight'}</button>
          </div>
          <button onclick="deleteNode('${node.id}')" style="margin-top:12px; width:100%; border-color:var(--accent-pink); color:var(--accent-pink);">Remove Device</button>
        `;
      } else if (selectedBackdropId) {
        const bd = backdrops.find(b => b.id === selectedBackdropId);
        container.innerHTML = `
          <div class="field">
            <label>Group Backdrop Title</label>
            <input type="text" value="${bd.title}" oninput="updateBackdropProp('${bd.id}', 'title', this.value)">
          </div>
          <div class="field">
            <label>Border Accent Color</label>
            <input type="color" value="${bd.color}" onchange="updateBackdropProp('${bd.id}', 'color', this.value)">
          </div>
          <button onclick="deleteBackdrop('${bd.id}')" style="margin-top:12px; width:100%; border-color:var(--accent-pink); color:var(--accent-pink);">Delete Backdrop</button>
        `;
      } else if (selectedConnId) {
        container.innerHTML = `
          <div class="field"><label>Cable Connection</label><span style="font-size:0.8rem;">Active Signal Route</span></div>
          <button onclick="deleteConnection('${selectedConnId}')" style="margin-top:12px; width:100%; border-color:var(--accent-pink); color:var(--accent-pink);">Remove Connection</button>
        `;
      } else {
        container.innerHTML = '<div style="font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-top: 2rem;">Select a node, backdrop, or cable to inspect.</div>';
      }
    }

    // --- Node Property Updaters ---
    function updateNodeProp(id, prop, val) {
      const node = nodes.find(n => n.id === id);
      if (!node) return;
      
      if (prop === 'inPorts' || prop === 'outPorts') val = parseInt(val) || 0;
      node[prop] = val;
      
      if (prop === 'inPorts' || prop === 'outPorts' || prop === 'color') {
        // Re-render node structure when ports or colors change dynamically
        const el = document.getElementById(id);
        el.remove();
        renderNodeToDOM(node);
        selectNode(id);
        updateConnections();
      } else {
        const el = document.getElementById(id);
        if (prop === 'label') el.querySelector('.lbl').innerText = val;
        if (prop === 'ip') el.querySelector('.ip-tag').innerText = val;
      }
    }

    function toggleStar(id) {
      const node = nodes.find(n => n.id === id);
      if (node) {
        node.starred = !node.starred;
        document.getElementById(id)?.classList.toggle('starred', node.starred);
        renderInspector();
      }
    }

    function toggleHighlight(id) {
      const node = nodes.find(n => n.id === id);
      if (node) {
        node.highlighted = !node.highlighted;
        document.getElementById(id)?.classList.toggle('highlighted', node.highlighted);
        renderInspector();
      }
    }

    function updateBackdropProp(id, prop, val) {
      const bd = backdrops.find(b => b.id === id);
      if (bd) {
        bd[prop] = val;
        updateBackdropDOM(bd);
      }
    }

    // --- Layers Management ---
    function renderLayers() {
      layersListEl.innerHTML = '';
      layers.forEach(layer => {
        const div = document.createElement('div');
        div.className = 'layer-item';
        div.innerHTML = `
          <button style="padding:2px 4px; border:none; background:transparent;" onclick="toggleLayer('${layer.id}')">${layer.visible ? '👁' : '🕶'}</button>
          <input type="text" value="${layer.name}" onchange="updateLayerName('${layer.id}', this.value)">
        `;
        layersListEl.appendChild(div);
      });
      refreshVisibility();
    }

    function addLayer() {
      layers.push({ id: 'layer_' + Date.now(), name: 'New Layer', visible: true });
      renderLayers();
    }

    function toggleLayer(id) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.visible = !layer.visible;
      renderLayers();
    }

    function updateLayerName(id, name) {
      const layer = layers.find(l => l.id === id);
      if (layer) layer.name = name;
    }

    function refreshVisibility() {
      nodes.forEach(node => {
        const layer = layers.find(l => l.id === node.layerId);
        const el = document.getElementById(node.id);
        if (el) el.classList.toggle('hidden', layer && !layer.visible);
      });
      updateConnections();
    }

    // --- Canvas Actions & Cleanup ---
    function deleteNode(id) {
      nodes = nodes.filter(n => n.id !== id);
      connections = connections.filter(c => c.from !== id && c.to !== id);
      document.getElementById(id)?.remove();
      deselectAll();
      updateConnections();
    }

    function deleteBackdrop(id) {
      backdrops = backdrops.filter(b => b.id !== id);
      document.getElementById(id)?.remove();
      deselectAll();
    }

    function deleteConnection(id) {
      connections = connections.filter(c => c.id !== id);
      deselectAll();
      updateConnections();
    }

    function clearCanvas() {
      if (confirm('Clear entire schematic canvas?')) {
        nodes = []; backdrops = []; connections = [];
        document.querySelectorAll('.node, .backdrop').forEach(el => el.remove());
        deselectAll();
        updateConnections();
      }
    }

    function toggleGrid() {
      snapToGrid = !snapToGrid;
      document.getElementById('btn-grid').classList.toggle('active', snapToGrid);
    }

    function snapAllNodes() {
      nodes.forEach(n => {
        n.x = Math.round(n.x / GRID_SIZE) * GRID_SIZE;
        n.y = Math.round(n.y / GRID_SIZE) * GRID_SIZE;
        updateNodePositionDOM(n);
      });
      updateConnections();
    }

    // --- File Storage Import/Export ---
    function exportJSON() {
      const schematicData = { version: "2026.2", layers, backdrops, nodes, connections, viewport: { scale, panX, panY } };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(schematicData, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `node-labs-project-${Date.now()}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function importJSON() { document.getElementById('file-input').click(); }

    function handleFileSelect(evt) {
      const file = evt.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          nodes = []; backdrops = []; connections = [];
          document.querySelectorAll('.node, .backdrop').forEach(el => el.remove());

          layers = data.layers || [];
          backdrops = data.backdrops || [];
          nodes = data.nodes || [];
          connections = data.connections || [];
          
          if (data.viewport) {
            scale = data.viewport.scale || 1;
            panX = data.viewport.panX || 0;
            panY = data.viewport.panY || 0;
            applyTransform();
          }

          renderLayers();
          backdrops.forEach(bd => renderBackdropToDOM(bd));
          nodes.forEach(node => renderNodeToDOM(node));
          updateConnections();
          deselectAll();
        } catch (err) {
          alert('Failed to parse project JSON file.');
        }
      };
      reader.readAsText(file);
      evt.target.value = '';
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (selectedNodeId) deleteNode(selectedNodeId);
        else if (selectedBackdropId) deleteBackdrop(selectedBackdropId);
        else if (selectedConnId) deleteConnection(selectedConnId);
      }
    });

    window.onload = init;
  </script>
</body>
</html>
